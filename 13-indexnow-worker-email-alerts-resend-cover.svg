<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 1200 630">
  <defs>
    <style>
      .bg-main { fill: #005f6b; }
      .stripe1 { fill: #001a1e; }
      .stripe2 { fill: #002830; }
      .stripe3 { fill: #003540; }
      .stripe4 { fill: #004350; }
      .stripe5 { fill: #005060; }
      .tagline { fill: #faf7f5; font-family: Inter-Regular, Inter; font-size: 18px; }
      .headline { font-family: Inter-Bold, Inter; font-weight: 700; font-size: 60px; }
      .hl-white { fill: #ffffff; }
      .hl-teal { fill: #0096a6; }
      .sub { fill: #faf7f5; font-family: Inter-Regular, Inter; font-size: 36px; }
      .node { fill: #0c0c14; stroke: #1a2a2d; stroke-width: 1.5px; }
      .node-worker { fill: #0c0c14; stroke: #0096a6; stroke-width: 2.5px; }
      .node-title { fill: #faf7f5; font-family: Inter-Bold, Inter; font-weight: 700; font-size: 14px; }
      .node-meta { fill: #888888; font-family: 'Courier New', Courier, monospace; font-size: 11px; }
      .arrow { stroke: #0096a6; stroke-width: 2.5px; fill: none; }
      .arrow-red { stroke: #e673ac; stroke-width: 2.5px; fill: none; }
      .arrow-label { fill: #0096a6; font-family: 'Courier New', Courier, monospace; font-size: 10px; font-weight: 700; }
      .email-card { fill: #faf7f5; stroke: #0096a6; stroke-width: 1.5px; }
      .email-card-fail { fill: #faf7f5; stroke: #e673ac; stroke-width: 1.5px; }
      .email-from { fill: #230e17; fill-opacity: 0.55; font-family: Inter-Regular, Inter; font-size: 10px; }
      .email-subject-ok { fill: #0096a6; font-family: Inter-Bold, Inter; font-weight: 700; font-size: 12px; }
      .email-subject-fail { fill: #e673ac; font-family: Inter-Bold, Inter; font-weight: 700; font-size: 12px; }
      .email-meta { fill: #230e17; font-family: Inter-Regular, Inter; font-size: 10px; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0096a6"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e673ac"/>
    </marker>
  </defs>
  <g>
    <rect class="bg-main" x="0" y="0" width="1200" height="630"/>
    <rect class="stripe1" x="0" y="0" width="150" height="630"/>
    <rect class="stripe2" x="149.15" y="0" width="150" height="630"/>
    <rect class="stripe3" x="299.15" y="0" width="150" height="630"/>
    <rect class="stripe4" x="449.15" y="0" width="150" height="630"/>
    <rect class="stripe5" x="599.15" y="0" width="150" height="630"/>
  </g>
  <text class="tagline" transform="translate(72.53 71.11)"><tspan x="0" y="0">MONITORING / SEO</tspan></text>
  <text class="headline" transform="translate(72.53 178.65)"><tspan class="hl-teal"><tspan x="0" y="0">Email alerts</tspan></tspan><tspan class="hl-white"><tspan y="0"> for</tspan></tspan><tspan class="hl-white"><tspan x="0" y="72">your IndexNow</tspan></tspan><tspan class="hl-white"><tspan x="0" y="144">Worker.</tspan></tspan></text>
  <text class="sub" transform="translate(72.53 519.64)"><tspan x="0" y="0">Know what your Worker did</tspan><tspan x="0" y="42">without checking logs.</tspan></text>

  <!-- RIGHT: Worker → Resend → Inbox with OK + FAILED emails -->
  <g>
    <!-- Worker node -->
    <rect class="node-worker" x="770" y="130" width="190" height="100" rx="10" ry="10"/>
    <rect x="785" y="145" width="44" height="14" rx="3" ry="3" fill="#0096a6" fill-opacity="0.2" stroke="#0096a6" stroke-width="1"/>
    <text text-anchor="middle" x="807" y="155" font-family="Inter-Bold, Inter" font-weight="700" font-size="9" fill="#0096a6" style="letter-spacing:1.5px"><tspan x="807" y="155">EDGE</tspan></text>
    <text class="node-title" transform="translate(785 182)"><tspan x="0" y="0">Cloudflare Worker</tspan></text>
    <text class="node-meta" transform="translate(785 202)"><tspan x="0" y="0">runWithAlerts(env,</tspan></text>
    <text class="node-meta" transform="translate(785 217)"><tspan x="0" y="0">'cron' | 'manual')</tspan></text>

    <!-- Arrow Worker → Resend -->
    <line x1="960" y1="180" x2="994.0" y2="180.0" stroke="#0096a6" stroke-width="2.5" fill="none" stroke-linecap="round"/><polygon points="991.0,185.0 1000.0,180.0 991.0,175.0" fill="#0096a6"/>
    <text class="arrow-label" transform="translate(961 172)"><tspan x="0" y="0">POST</tspan></text>

    <!-- Resend node -->
    <rect class="node" x="1005" y="145" width="160" height="70" rx="10" ry="10"/>
    <text class="node-title" text-anchor="middle" x="1085" y="173"><tspan x="1085" y="173">Resend</tspan></text>
    <text class="node-meta" text-anchor="middle" x="1085" y="193"><tspan x="1085" y="193">api.resend.com</tspan></text>
    <text class="node-meta" text-anchor="middle" x="1085" y="207" style="fill:#faf7f5"><tspan x="1085" y="207">/emails</tspan></text>

    <!-- Arrows down Resend → two emails -->
    <line x1="1050" y1="218" x2="905.4" y2="287.4" stroke="#0096a6" stroke-width="2.5" fill="none" stroke-linecap="round"/><polygon points="906.0,281.6 900.0,290.0 910.3,290.6" fill="#0096a6"/>
    <line x1="1120" y1="218" x2="1081.0" y2="444.1" stroke="#e673ac" stroke-width="2.5" fill="none" stroke-linecap="round"/><polygon points="1076.6,440.3 1080.0,450.0 1086.5,442.0" fill="#e673ac"/>

    <!-- OK email card -->
    <rect class="email-card" x="760" y="290" width="290" height="130" rx="6" ry="6"/>
    <text class="email-from"    transform="translate(775 312)"><tspan x="0" y="0">from alerts@yourdomain.com</tspan></text>
    <text class="email-subject-ok" transform="translate(775 332)"><tspan x="0" y="0">OK: IndexNow Worker, 3 new / 0 removed</tspan></text>
    <line x1="775" y1="344" x2="1035" y2="344" stroke="#230e17" stroke-opacity="0.08" stroke-width="1"/>
    <text class="email-meta" transform="translate(775 360)"><tspan x="0" y="0">Bing</tspan><tspan x="80" y="0" style="fill:#0096a6;font-weight:700">200 OK</tspan><tspan x="160" y="0" style="fill:#230e17;fill-opacity:0.55">queued</tspan></text>
    <text class="email-meta" transform="translate(775 376)"><tspan x="0" y="0">Yandex</tspan><tspan x="80" y="0" style="fill:#0096a6;font-weight:700">200 OK</tspan><tspan x="160" y="0" style="fill:#230e17;fill-opacity:0.55">queued</tspan></text>
    <text class="email-meta" transform="translate(775 392)"><tspan x="0" y="0">Seznam</tspan><tspan x="80" y="0" style="fill:#0096a6;font-weight:700">200 OK</tspan><tspan x="160" y="0" style="fill:#230e17;fill-opacity:0.55">queued</tspan></text>
    <text class="email-meta" transform="translate(775 408)"><tspan x="0" y="0">Naver</tspan><tspan x="80" y="0" style="fill:#0096a6;font-weight:700">200 OK</tspan><tspan x="160" y="0" style="fill:#230e17;fill-opacity:0.55">queued</tspan></text>

    <!-- FAILED email card -->
    <rect class="email-card-fail" x="900" y="450" width="290" height="110" rx="6" ry="6"/>
    <text class="email-from"      transform="translate(915 472)"><tspan x="0" y="0">from alerts@yourdomain.com</tspan></text>
    <text class="email-subject-fail" transform="translate(915 492)"><tspan x="0" y="0">FAILED: IndexNow Worker</tspan></text>
    <line x1="915" y1="504" x2="1175" y2="504" stroke="#230e17" stroke-opacity="0.08" stroke-width="1"/>
    <text class="email-meta" transform="translate(915 520)" style="font-family:'Courier New',Courier,monospace;font-size:11px;"><tspan x="0" y="0">Error: Sitemap fetch failed:</tspan></text>
    <text class="email-meta" transform="translate(915 536)" style="font-family:'Courier New',Courier,monospace;font-size:11px;"><tspan x="0" y="0">404 at https://yoursite.com/</tspan></text>
    <text class="email-meta" transform="translate(915 552)" style="font-family:'Courier New',Courier,monospace;font-size:11px;"><tspan x="0" y="0">sitemap.xml</tspan></text>
  </g>
</svg>
