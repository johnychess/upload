<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 1200 630">
  <defs>
    <style>
      .bg-main { fill: #005f6b; }
      .stripe1 { fill: #001a1e; }
      .stripe2 { fill: #002830; }
      .stripe3 { fill: #003540; }
      .stripe4 { fill: #004350; }
      .stripe5 { fill: #005060; }
      .tagline { fill: #faf7f5; font-family: Inter-Regular, Inter; font-size: 18px; }
      .headline { font-family: Inter-Bold, Inter; font-weight: 700; font-size: 60px; }
      .hl-white { fill: #ffffff; }
      .hl-teal { fill: #0096a6; }
      .sub { fill: #faf7f5; font-family: Inter-Regular, Inter; font-size: 36px; }
      .node { fill: #0c0c14; stroke: #1a2a2d; stroke-width: 1.5px; }
      .node-ga { fill: #0c0c14; stroke: #e673ac; stroke-width: 2px; }
      .node-br { fill: #0c0c14; stroke: #0096a6; stroke-width: 2.5px; }
      .node-title { fill: #faf7f5; font-family: Inter-Bold, Inter; font-weight: 700; font-size: 14px; }
      .node-meta { fill: #888888; font-family: 'Courier New', Courier, monospace; font-size: 11px; }
      .node-val { fill: #faf7f5; font-family: 'Courier New', Courier, monospace; font-size: 12px; }
      .arrow { stroke: #0096a6; stroke-width: 2.5px; fill: none; }
      .arrow-label { fill: #faf7f5; font-family: 'Courier New', Courier, monospace; font-size: 10px; font-weight: 700; }
    </style>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0096a6"/>
    </marker>
  </defs>
  <g>
    <rect class="bg-main" x="0" y="0" width="1200" height="630"/>
    <rect class="stripe1" x="0" y="0" width="150" height="630"/>
    <rect class="stripe2" x="149.15" y="0" width="150" height="630"/>
    <rect class="stripe3" x="299.15" y="0" width="150" height="630"/>
    <rect class="stripe4" x="449.15" y="0" width="150" height="630"/>
    <rect class="stripe5" x="599.15" y="0" width="150" height="630"/>
  </g>
  <text class="tagline" transform="translate(72.53 71.11)"><tspan x="0" y="0">TECHNICAL SETUP / BLOOMREACH</tspan></text>
  <text class="headline" transform="translate(72.53 178.65)"><tspan class="hl-white"><tspan x="0" y="0">Capture the</tspan></tspan><tspan class="hl-teal"><tspan x="0" y="72">GA4 Client ID</tspan></tspan><tspan class="hl-white"><tspan x="0" y="144">in Engagement.</tspan></tspan></text>
  <text class="sub" transform="translate(72.53 561.64)"><tspan x="0" y="0">Stitch sessions across analytics and CDP.</tspan></text>

  <!-- RIGHT: data flow diagram -->
  <g>
    <!-- Node 1: Browser cookie -->
    <rect class="node" x="780" y="110" width="180" height="80" rx="10" ry="10"/>
    <text class="node-title" transform="translate(798 135)"><tspan x="0" y="0">_ga cookie</tspan></text>
    <text class="node-meta" transform="translate(798 158)"><tspan x="0" y="0">set by gtag('config')</tspan></text>
    <text class="node-val" transform="translate(798 178)"><tspan x="0" y="0">GA1.2.823..1700..</tspan></text>

    <!-- Arrow 1 down -->
    <line x1="870" y1="195" x2="870.0" y2="229.0" stroke="#0096a6" stroke-width="2.5" fill="none" stroke-linecap="round"/><polygon points="865.0,226.0 870.0,235.0 875.0,226.0" fill="#0096a6"/>
    <text class="arrow-label" transform="translate(880 220)"><tspan x="0" y="0">parse</tspan></text>

    <!-- Node 2: JS getter -->
    <rect class="node-ga" x="780" y="240" width="180" height="80" rx="10" ry="10"/>
    <text class="node-title" transform="translate(798 265)"><tspan x="0" y="0">JS snippet</tspan></text>
    <text class="node-meta" transform="translate(798 288)"><tspan x="0" y="0">getClientId()</tspan></text>
    <text class="node-val" transform="translate(798 308)"><tspan x="0" y="0">823..1700..</tspan></text>

    <!-- Arrow 2 right-down to Bloomreach event -->
    <line x1="870" y1="325" x2="870.0" y2="359.0" stroke="#0096a6" stroke-width="2.5" fill="none" stroke-linecap="round"/><polygon points="865.0,356.0 870.0,365.0 875.0,356.0" fill="#0096a6"/>
    <text class="arrow-label" transform="translate(880 352)"><tspan x="0" y="0">track</tspan></text>

    <!-- Node 3: Bloomreach event -->
    <rect class="node-br" x="780" y="370" width="330" height="105" rx="10" ry="10"/>
    <text class="node-title" transform="translate(798 395)"><tspan x="0" y="0">Bloomreach event</tspan></text>
    <text class="node-meta" transform="translate(798 418)"><tspan x="0" y="0">exponea.identify({</tspan></text>
    <text class="node-val" transform="translate(813 438)"><tspan x="0" y="0">ga_client_id: </tspan><tspan fill="#0096a6">'823..1700..'</tspan></text>
    <text class="node-meta" transform="translate(798 458)"><tspan x="0" y="0">});</tspan></text>

    <!-- Side arrow from node 2 to GA4 indicator -->
    <rect class="node" x="980" y="240" width="130" height="80" rx="10" ry="10"/>
    <text class="node-title" text-anchor="middle" x="1045" y="272" style="fill:#e673ac"><tspan x="1045" y="272">GA4</tspan></text>
    <text class="node-meta" text-anchor="middle" x="1045" y="292"><tspan x="1045" y="292">measurement</tspan></text>
    <text class="node-meta" text-anchor="middle" x="1045" y="308"><tspan x="1045" y="308">id: G-XXXXXXX</tspan></text>
    <line x1="960" y1="280" x2="974.0" y2="280.0" stroke="#e673ac" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/><polygon points="971.0,285.0 980.0,280.0 971.0,275.0" fill="#e673ac" opacity="0.7"/>

    <!-- Outcome pill -->
    <rect x="780" y="495" width="330" height="30" rx="8" ry="8" fill="#0c0c14" stroke="#0096a6" stroke-width="1.5"/>
    <text text-anchor="middle" x="945" y="514" font-family="Inter-Bold, Inter" font-weight="700" font-size="12" fill="#0096a6" style="letter-spacing:2px"><tspan x="945" y="514">ONE USER · BOTH SYSTEMS · ONE ID</tspan></text>
  </g>
