    <text class="engine-meta" transform="translate(810 362)"><tspan x="0" y="0">www.bing.com/indexnow</tspan></text>
    <text class="engine-meta" transform="translate(810 378)" style="fill:#0096a6;font-weight:700"><tspan x="0" y="0">200 OK · queued</tspan></text>

    <rect class="engine-card" x="970" y="310" width="160" height="80" rx="10" ry="10"/>
    <text class="engine-label" transform="translate(990 340)"><tspan x="0" y="0">Yandex</tspan></text>
    <text class="engine-meta" transform="translate(990 362)"><tspan x="0" y="0">yandex.com/indexnow</tspan></text>
    <text class="engine-meta" transform="translate(990 378)" style="fill:#0096a6;font-weight:700"><tspan x="0" y="0">200 OK · queued</tspan></text>

    <rect class="engine-card" x="880" y="410" width="160" height="60" rx="10" ry="10"/>
    <text class="engine-label" transform="translate(900 435)"><tspan x="0" y="0">Seznam · Naver</tspan></text>
    <text class="engine-meta" transform="translate(900 455)"><tspan x="0" y="0">other IndexNow partners</tspan></text>

    <!-- outcome pill -->
    <rect x="770" y="490" width="360" height="30" rx="8" ry="8" fill="#0c0c14" stroke="#0096a6" stroke-width="1.5"/>
    <text text-anchor="middle" x="950" y="510" font-family="Inter-Bold, Inter" font-weight="700" font-size="12" fill="#0096a6" style="letter-spacing:2px"><tspan x="950" y="510">INDEXED IN MINUTES, NOT DAYS</tspan></text>
