    <line x1="1120" y1="150" x2="1146.9" y2="133.2" stroke="#0096a6" stroke-width="2.5" fill="none" stroke-linecap="round"/><polygon points="1147.0,139.0 1152.0,130.0 1141.7,130.5" fill="#0096a6"/>
    <line x1="1120" y1="180" x2="1146.6" y2="192.5" stroke="#0096a6" stroke-width="2.5" fill="none" stroke-linecap="round"/><polygon points="1141.7,195.7 1152.0,195.0 1146.0,186.7" fill="#0096a6"/>
    <line x1="1120" y1="200" x2="1149.5" y2="264.5" stroke="#0096a6" stroke-width="2.5" fill="none" stroke-linecap="round"/><polygon points="1143.7,263.9 1152.0,270.0 1152.8,259.7" fill="#0096a6"/>

    <!-- Search engines (stub visible indicators on the right) -->
    <g transform="translate(970 245)">
