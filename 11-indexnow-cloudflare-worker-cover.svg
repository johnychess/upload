    <text class="node-meta" transform="translate(955 187)"><tspan x="0" y="0">fetch('https://api.</tspan></text>
    <text class="node-meta" transform="translate(955 202)"><tspan x="0" y="0">indexnow.org/indexnow')</tspan></text>

