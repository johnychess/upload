<?xml version="1.0" encoding="UTF-8"?>
<svg id="Layer_1" xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 1200 630">
  <defs>
    <style>
      .bg-main { fill: #005f6b; }
      .stripe1 { fill: #001a1e; }
      .stripe2 { fill: #002830; }
      .stripe3 { fill: #003540; }
      .stripe4 { fill: #004350; }
      .stripe5 { fill: #005060; }
      .tagline { fill: #faf7f5; font-family: Inter-Regular, Inter; font-size: 18px; }
      .headline { font-family: Inter-Bold, Inter; font-weight: 700; font-size: 60px; }
      .hl-white { fill: #ffffff; }
      .hl-teal { fill: #0096a6; }
      .sub { fill: #faf7f5; font-family: Inter-Regular, Inter; font-size: 36px; }
      .row-label { fill: #faf7f5; font-family: Inter-Bold, Inter; font-weight: 700; font-size: 12px; letter-spacing: 2px; opacity: 0.85; }
      .row-label-dim { fill: #faf7f5; opacity: 0.55; font-family: Inter-Bold, Inter; font-weight: 700; font-size: 12px; letter-spacing: 2px; }
      .bar-gtm { fill: #faf7f5; opacity: 0.25; stroke: #001a1e; stroke-width: 1.5px; }
      .bar-sdk-slow { fill: #faf7f5; opacity: 0.18; stroke: #001a1e; stroke-width: 1.5px; }
      .bar-sdk-fast { fill: #0c0c14; stroke: #0096a6; stroke-width: 2.5px; }
      .bar-text { fill: #faf7f5; font-family: 'Courier New', Courier, monospace; font-size: 12px; font-weight: 700; }
      .bar-text-dark { fill: #faf7f5; font-family: 'Courier New', Courier, monospace; font-size: 12px; font-weight: 700; }
      .tick { fill: #faf7f5; opacity: 0.5; font-family: 'Courier New', Courier, monospace; font-size: 10px; }
      .delta { stroke: #0096a6; stroke-width: 2.5px; fill: none; stroke-dasharray: 3,3; }
      .delta-label { fill: #0096a6; font-family: Inter-SemiBold, Inter; font-weight: 600; font-size: 11px; }
      .delta-slow { stroke: #e673ac; stroke-width: 2px; fill: none; stroke-dasharray: 3,3; }
      .delta-slow-label { fill: #ff8a80; font-family: Inter-SemiBold, Inter; font-weight: 600; font-size: 11px; }
    </style>
  </defs>
  <g>
    <rect class="bg-main" x="0" y="0" width="1200" height="630"/>
    <rect class="stripe1" x="0" y="0" width="150" height="630"/>
    <rect class="stripe2" x="149.15" y="0" width="150" height="630"/>
    <rect class="stripe3" x="299.15" y="0" width="150" height="630"/>
    <rect class="stripe4" x="449.15" y="0" width="150" height="630"/>
    <rect class="stripe5" x="599.15" y="0" width="150" height="630"/>
  </g>
  <text class="tagline" transform="translate(72.53 71.11)"><tspan x="0" y="0">TECHNICAL SETUP / BLOOMREACH</tspan></text>
  <text class="headline" transform="translate(72.53 178.65)"><tspan class="hl-white"><tspan x="0" y="0">Bloomreach</tspan></tspan><tspan class="hl-white"><tspan x="0" y="72">Without the</tspan></tspan><tspan class="hl-teal"><tspan x="0" y="144">GTM Waterfall.</tspan></tspan></text>
  <text class="sub" transform="translate(72.53 561.64)"><tspan x="0" y="0">SDK in head, parallel with GTM.</tspan></text>

  <!-- RIGHT: Waterfall comparison -->
  <g>
    <!-- Time ticks -->
    <text class="tick" transform="translate(770 108)"><tspan x="0" y="0">0ms</tspan></text>
    <text class="tick" transform="translate(1105 108)"><tspan x="0" y="0">800ms</tspan></text>

    <!-- VIA GTM -->
    <text class="row-label-dim" transform="translate(770 130)"><tspan x="0" y="0">VIA GTM</tspan></text>
    <rect class="bar-gtm" x="770" y="142" width="160" height="26" rx="4" ry="4"/>
    <text class="bar-text" text-anchor="middle" x="850" y="160"><tspan x="850" y="160">gtm.js</tspan></text>
    <rect class="bar-sdk-slow" x="930" y="142" width="160" height="26" rx="4" ry="4"/>
    <text class="bar-text" text-anchor="middle" x="1010" y="160"><tspan x="1010" y="160">exponea.min.js</tspan></text>
    <line x1="1090" y1="135" x2="1090.0" y2="180.0" stroke="#e673ac" stroke-width="2" fill="none" stroke-linecap="round" stroke-dasharray="3 3"/>
    <text class="delta-slow-label" text-anchor="middle" x="1090" y="196"><tspan x="1090" y="196">session_start</tspan></text>
    <text class="delta-slow-label" text-anchor="middle" x="1090" y="210" style="font-family:'Courier New',Courier,monospace"><tspan x="1090" y="210">+720ms</tspan></text>

    <!-- Separator -->
    <line x1="770" y1="250" x2="1150" y2="250" stroke="#faf7f5" stroke-width="1" stroke-dasharray="3,4" opacity="0.3"/>
    <text class="row-label" text-anchor="middle" x="960" y="246" style="fill:#faf7f5;font-weight:700;font-size:12px;letter-spacing:3px"><tspan x="960" y="246">DIRECT-HEAD</tspan></text>

    <!-- DIRECT -->
    <text class="row-label" transform="translate(770 282)"><tspan x="0" y="0">DIRECT IN HEAD</tspan></text>
    <rect class="bar-gtm" x="770" y="294" width="160" height="26" rx="4" ry="4"/>
    <text class="bar-text" text-anchor="middle" x="850" y="312"><tspan x="850" y="312">gtm.js</tspan></text>
    <rect class="bar-sdk-fast" x="770" y="326" width="160" height="26" rx="4" ry="4"/>
    <text class="bar-text-dark" text-anchor="middle" x="850" y="344"><tspan x="850" y="344">exponea.min.js</tspan></text>
    <line x1="930" y1="287" x2="930.0" y2="360.0" stroke="#0096a6" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-dasharray="3 3"/>
    <text class="delta-label" text-anchor="middle" x="930" y="376"><tspan x="930" y="376">session_start</tspan></text>
    <text class="delta-label" text-anchor="middle" x="930" y="390" style="font-family:'Courier New',Courier,monospace"><tspan x="930" y="390">+360ms</tspan></text>

    <!-- Delta callout -->
    <rect x="770" y="420" width="380" height="70" rx="10" ry="10" fill="#1e1e24" stroke="#0096a6" stroke-width="2.5"/>
    <text text-anchor="middle" x="960" y="448" font-family="Inter-Bold, Inter" font-weight="700" font-size="13" fill="#0096a6" style="letter-spacing:2px"><tspan x="960" y="448">EARLIER EVENTS, LESS LOST TRACKING</tspan></text>
    <text text-anchor="middle" x="960" y="472" font-family="Inter-Regular, Inter" font-size="14" fill="#faf7f5" style="font-weight:600"><tspan x="960" y="472">SDK ready ~360ms sooner on cold loads</tspan></text>
  </g>
</svg>
